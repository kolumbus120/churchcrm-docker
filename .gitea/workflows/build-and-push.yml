name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 2 * * *'  # Každý deň o 2:00 UTC (automatická kontrola)
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.gitea/workflows/build-and-push.yml'
  workflow_dispatch:  # Manuálny trigger cez Gitea UI

jobs:
  build:
    runs-on: ubuntu
    steps:
      # 1. Checkout repozitár
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Nastavenie Docker Buildx (pre multi-platform build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Prihlásenie do Docker Hub (pre komunitu)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 4. Získanie najnovšej verzie ChurchCRM z GitHub
      - name: Get latest ChurchCRM version
        id: churchcrm_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/ChurchCRM/CRM/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "Latest ChurchCRM version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      # 5. Získanie aktuálneho dátumu pre tag
      - name: Get current date
        id: date
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "date=$DATE" >> $GITHUB_OUTPUT

      # 6. Build a push Docker image
      - name: Build and push Docker images
        uses: docker/build-push-action@v4
        with:
          context: .
          build-args: |
            CHURCHCRM_VERSION=${{ steps.churchcrm_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            # Docker Hub tags (pre komunitu)
            ${{ secrets.DOCKER_HUB_USER || 'kolumbus120' }}/churchcrm:latest
            ${{ secrets.DOCKER_HUB_USER || 'kolumbus120' }}/churchcrm:${{ steps.churchcrm_version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USER || 'kolumbus120' }}/churchcrm:${{ steps.date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Vypísanie informácií o build
      - name: Print build info
        run: |
          echo "✅ Docker image built and pushed to Docker Hub!"
          echo "ChurchCRM version: ${{ steps.churchcrm_version.outputs.version }}"
          echo "Date: ${{ steps.date.outputs.date }}"
