name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 2 * * *'  # Každý deň o 2:00 UTC (automatická kontrola)
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.gitea/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      force_latest:
        description: 'Force update :latest (použiť pri povýšení major verzie)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest ChurchCRM version
        id: version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/ChurchCRM/CRM/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "prev_major=$((MAJOR - 1))" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check build conditions
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR="${{ steps.version.outputs.major }}"
          PREV="${{ steps.version.outputs.prev_major }}"
          HUB="https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_HUB_USER }}/churchcrm/tags"

          V_HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$HUB/$VERSION/")
          M_HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$HUB/$MAJOR/")
          P_HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$HUB/$PREV/")

          if [ "$V_HTTP" = "200" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "major_jump=false" >> $GITHUB_OUTPUT
            echo "Verzia $VERSION už je na Docker Hub — preskakujem"
          elif [ "$M_HTTP" != "200" ] && [ "$P_HTTP" = "200" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "major_jump=true" >> $GITHUB_OUTPUT
            echo "Major version jump: $PREV → $MAJOR"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "major_jump=false" >> $GITHUB_OUTPUT
            echo "Buildujem verziu $VERSION"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Registry
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Login to Docker Hub
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push (normal update or force_latest)
        if: >
          steps.check.outputs.skip != 'true' &&
          (steps.check.outputs.major_jump != 'true' || inputs.force_latest == true)
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: CHURCHCRM_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/churchcrm-docker:latest
            ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/churchcrm-docker:${{ steps.version.outputs.major }}
            ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/churchcrm-docker:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:latest
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.version.outputs.major }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.version.outputs.date }}

      - name: Build and push (major jump — :latest protected)
        if: >
          steps.check.outputs.skip != 'true' &&
          steps.check.outputs.major_jump == 'true' &&
          inputs.force_latest != true
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: CHURCHCRM_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/churchcrm-docker:${{ steps.version.outputs.major }}
            ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/churchcrm-docker:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.version.outputs.major }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.version.outputs.date }}

      - name: Create Gitea issue for major version jump
        if: steps.check.outputs.major_jump == 'true' && inputs.force_latest != true
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR="${{ steps.version.outputs.major }}"
          PREV="${{ steps.version.outputs.prev_major }}"
          DATE="${{ steps.version.outputs.date }}"
          BODY=$(jq -n \
            --arg title "⚠️ Major version available: ChurchCRM ${VERSION}" \
            --arg body "## ChurchCRM ${VERSION} is available\n\n**:latest tag was NOT updated** — it stays on the last ${PREV}.x version.\n\nNew tags published:\n- \`kolumbus120/churchcrm:${VERSION}\`\n- \`kolumbus120/churchcrm:${MAJOR}\` (tracks all ${MAJOR}.x updates)\n- \`kolumbus120/churchcrm:${DATE}\`\n\n## Before upgrading\n\n- [ ] Read the [ChurchCRM ${VERSION} release notes](https://github.com/ChurchCRM/CRM/releases/tag/${VERSION})\n- [ ] Backup your database\n- [ ] Test on staging first\n\n## How to upgrade\n\nChange your image tag:\n\`\`\`yaml\nimage: kolumbus120/churchcrm:${VERSION}\n\`\`\`\nor use the major tag to keep getting ${MAJOR}.x updates:\n\`\`\`yaml\nimage: kolumbus120/churchcrm:${MAJOR}\n\`\`\`" \
            '{title: $title, body: $body}')
          curl -s -X POST \
            "https://git.serigrafika.sk/api/v1/repos/${{ secrets.REGISTRY_USER }}/churchcrm-docker/issues" \
            -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
