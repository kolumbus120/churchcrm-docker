name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2:00 UTC
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get latest ChurchCRM version
        id: churchcrm_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/ChurchCRM/CRM/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/build-push-action@v4
        with:
          context: .
          build-args: |
            CHURCHCRM_VERSION=${{ steps.churchcrm_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:latest
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.churchcrm_version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USER }}/churchcrm:${{ steps.date.outputs.date }}
